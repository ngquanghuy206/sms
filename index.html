    /* NAV */

    /* CARD */
    .card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
    .card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
    .card-title{font-family:"Orbitron",sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--lgray);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:8px}

    /* FORM */

    /* STATUS */
    .status-bar{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:13px 15px;font-size:13px;color:var(--fg);min-height:46px;display:flex;align-items:center;gap:10px}

    .dot.idle{background:var(--mu)}
    .dot.running{background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 1s infinite}
    .dot.stopped{background:var(--red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--bd)}

    /* TOAST */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;transition:transform .3s;z-index:9999;white-space:nowrap;pointer-events:none;color:var(--tx)}
    #toast.show{transform:translateX(-50%) translateY(0)}

    </div>

<div id="toast"></div>

<script>
const API = '';
let sessionId = null;
let polling = null;
let lastDone = -1;

function toast(msg, color='#ccc') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = color;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function log(msg, type='info') {
  const box = document.getElementById('log-box');
  const time = new Date().toLocaleTimeString('vi-VN');
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.textContent = `[${time}] ${msg}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function clearLog() { document.getElementById('log-box').innerHTML = ''; }

function setStatus(state, text) {
  document.getElementById('status-dot').className = 'dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function setProgress(cur, total) {
  document.getElementById('prog-wrap').classList.add('show');
  const pct = total > 0 ? Math.round(cur/total*100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `${cur} / ${total} (${pct}%)`;
}

async function startSpam() {
  const phone = document.getElementById('inp-phone').value.trim();
  const times = parseInt(document.getElementById('inp-times').value);

  if (!phone || phone.length !== 10 || !/^\d{10}$/.test(phone)) {
    toast('❌ Số điện thoại phải đúng 10 số!', '#ff6666'); return;
  }
  if (!times || times < 1) {
    toast('❌ Số lần phải >= 1!', '#ff6666'); return;
  }

  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  lastDone = -1;
  setStatus('running', `Đang spam ${phone.slice(0,3)}***${phone.slice(-3)} — ${times} lần`);
  log(`▶ Bắt đầu: ${phone.slice(0,3)}***${phone.slice(-3)}, ${times} lần`, 'info');

  try {
    const r = await fetch(API + '/api/sms/start', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({phone, times})
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Lỗi server');
    sessionId = d.session_id;
    log(`Session: ${sessionId}`, 'info');
    startPolling();
  } catch(e) {
    toast('❌ ' + e.message, '#ff6666');
    log('❌ Lỗi: ' + e.message, 'err');
    resetUI();
  }
}

function startPolling() {
  polling = setInterval(async () => {
    if (!sessionId) return;
    try {
      const r = await fetch(API + '/api/sms/status/' + sessionId);
      const d = await r.json();
      setProgress(d.done, d.total);
      if (d.done !== lastDone && d.last_msg) {
        log(d.last_msg, d.last_ok ? 'ok' : 'err');
        lastDone = d.done;
      }
      if (!d.running) {
        clearInterval(polling);
        if (d.done >= d.total) {
          setStatus('idle', `✅ Hoàn thành ${d.done}/${d.total}`);
          log(`✅ Xong! ${d.done}/${d.total}`, 'ok');
          toast('✅ Spam hoàn thành!', '#66ffaa');
        } else {
          setStatus('stopped', `⏹ Dừng tại ${d.done}/${d.total}`);
          log(`⏹ Dừng tại ${d.done}/${d.total}`, 'err');
        }
        resetUI();
        sessionId = null;
      }
    } catch(e) {}
  }, 1000);
}

async function stopSpam() {
  if (!sessionId) return;
  try {
    await fetch(API + '/api/sms/stop/' + sessionId, {method:'POST'});
    log('⏹ Đã yêu cầu dừng...', 'info');
    toast('⏹ Đang dừng...', '#ffaa44');
  } catch(e) {}
}

function updateClock() {
  const now = new Date();
  document.getElementById('ft-year').textContent = now.getFullYear();
  document.getElementById('ft-time').textContent = now.toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

function resetUI() {
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}
</script>
